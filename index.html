<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://quizbolt.site/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://quizbolt.site/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://quizbolt.site/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA / Mobile -->
    <meta
      name="theme-color"
      content="#1e293b"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f1f5f9"
      media="(prefers-color-scheme: light)"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Quiz Bolt" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Quiz Bolt" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Basic Meta -->
    <meta
      name="description"
      content="Quiz Bolt ⚡ – Boost your exam prep with fast, fun, and interactive quizzes! Practice past questions from your university and track your progress anytime, anywhere."
    />

    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:title" content="Quiz Bolt ⚡" />
    <meta
      property="og:description"
      content="Boost your exam prep with Quiz Bolt ⚡! Practice past university questions through fast, interactive quizzes and monitor your progress."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quizbolt.site/" />
    <meta
      property="og:image"
      content="https://quizbolt.site/cropped_circle_image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quiz Bolt ⚡" />
    <meta
      name="twitter:description"
      content="Boost your exam prep with Quiz Bolt ⚡! Practice past university questions with fast, interactive quizzes and track your progress."
    />
    <meta
      name="twitter:image"
      content="https://quizbolt.site/cropped_circle_image.png"
    />

    <title>Quiz Bolt ⚡ – Past Questions & Exam Practice</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
